<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPU Sulawesi Barat - Registrasi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <style>
    .form-input { @apply w-full p-3 border rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition-all; }
    .btn-circle { @apply w-12 h-12 rounded-full flex items-center justify-center text-white text-xl; }
    
    /* --- PERBAIKAN MIRROR (CSS) --- */
    /* Membuat tampilan video kamera depan menjadi mirror agar natural bagi pengguna */
    #video {
      transform: scaleX(-1);
      -webkit-transform: scaleX(-1);
    }
    
    /* Hasil foto preview JANGAN di-mirror (biar teks/wajah asli kelihatan benar) */
    #photo-preview {
      transform: scaleX(1);
      -webkit-transform: scaleX(1);
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen p-4">
  <div class="max-w-5xl mx-auto grid md:grid-cols-2 gap-6">
    <div class="bg-white p-6 rounded-3xl shadow-xl">
      <h2 class="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2">
        <i class="fas fa-id-card text-red-600"></i> Registrasi Peserta
      </h2>
      
      <form id="formReg" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <input type="number" id="nik" placeholder="NIK (16 Digit)" required class="border p-3 rounded-xl">
          <input type="number" id="noHp" placeholder="No WhatsApp" required class="border p-3 rounded-xl">
        </div>
        <input type="text" id="nama" placeholder="Nama Lengkap" required class="w-full border p-3 rounded-xl">
    
        <div class="grid grid-cols-2 gap-4">
          <div class="flex flex-col gap-1">
            <label class="text-[10px] uppercase font-bold text-slate-400 ml-2">Asal Satker</label>
            <select id="asalsatker" onchange="updateInstansi()" required class="p-2 border rounded-lg">
              <option value="" disabled selected>Memuat data...</option>
            </select>
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-[10px] uppercase font-bold text-slate-400 ml-2">Instansi</label>
            <select id="instansi" onchange="updateJabatan()" required class="p-2 border rounded-lg">
              <option value="" disabled selected>Pilih Instansi</option>
            </select>
          </div>
        </div>
        
        <div class="grid grid-cols-2 gap-4">
          <div class="flex flex-col gap-1 mt-4">
            <label class="text-[10px] uppercase font-bold text-slate-400 ml-2">Jabatan</label>
            <select id="jabatan" required class="p-2 border rounded-lg">
              <option value="" disabled selected>Pilih Jabatan</option>
            </select>
          </div>
          <div class="flex flex-col gap-1 mt-4">
            <label class="text-[10px] uppercase font-bold text-slate-400 ml-2">Jenis Kelamin</label>
            <select id="jk" required class="p-2 border rounded-lg">
              <option value="" disabled selected>Pilih</option>
              <option value="Laki-laki">Laki-laki</option>
              <option value="Perempuan">Perempuan</option>
            </select>
          </div>
        </div>

        <div class="camera-container mt-4 relative">
          <video id="video" autoplay playsinline class="w-full rounded-2xl bg-black aspect-square object-cover"></video>
          <img id="photo-preview" class="w-full hidden rounded-2xl border-4 border-white shadow-md aspect-square object-cover">
          <div class="flex justify-center gap-2 mt-[-30px] relative z-10">
            <button type="button" id="btn-cap" onclick="capture()" class="btn-circle bg-red-600 shadow-lg"><i class="fas fa-camera"></i></button>
            <button type="button" id="btn-retake" onclick="retake()" class="hidden btn-circle bg-slate-800 shadow-lg"><i class="fas fa-undo"></i></button>
          </div>
        </div>

        <button type="submit" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-green-700 transition-all mt-4">
          SIMPAN & TERBITKAN ID CARD
        </button>
      </form>
    </div>

    <div class="bg-white/50 backdrop-blur p-6 rounded-3xl border border-white">
      <h2 class="text-xl font-bold mb-4">Daftar Terdaftar</h2>
      <input type="text" id="keyword" oninput="doSearch()" placeholder="Cari NIK atau Nama..." class="w-full p-3 border rounded-xl mb-4 shadow-sm">
      <div id="results" class="space-y-3 max-h-[500px] overflow-y-auto"></div>
    </div>
  </div>

  <canvas id="cam-canvas" class="hidden"></canvas>
  <canvas id="id-canvas" width="700" height="1000" class="hidden"></canvas>

  <script>
    // --- KONFIGURASI ---
    // GANTI URL INI DENGAN URL WEB APP GAS ANDA
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzN7LXinht8WVLaw2b2iNKCCMQP02rYSY6WefD_fAdNxD0XLF18mQVQ1Ez_rpSxWYFOEg/exec";

    let fotoData = "";
    let masterData = [];
    let templateCached = "";

    // Fungsi Fetch khusus untuk ambil data (GET)
    async function fetchData(action, params = "") {
      try {
        const resp = await fetch(`${WEB_APP_URL}?action=${action}${params}`);
        return await resp.json();
      } catch (e) { return []; }
    }

    document.addEventListener('DOMContentLoaded', () => { initApp(); });

    
    async function initApp() {
      startCamera();
      try {
          // Ambil Data Referensi
          const resRef = await fetch(`${WEB_APP_URL}?action=getRefData`);
          masterData = await resRef.json();
          
          // Ambil Template ID Card (Tambahkan ini)
          const resTemp = await fetch(`${WEB_APP_URL}?action=getTemplate`);
          const dataTemp = await resTemp.json();
          templateCached = dataTemp.base64;
  
          // Render Dropdown Satker (Kode Anda yang sudah ada tetap di sini)
          const unikSatker = [...new Set(masterData.map(i => i.satker || i.asalsatker))].filter(s => s).sort();
          document.getElementById('asalsatker').innerHTML = '<option value="" disabled selected>Pilih Satker</option>' +
              unikSatker.map(s => `<option value="${s}">${s}</option>`).join('');
      } catch (err) { console.error(err); }
    }

    
    // --- LOGIKA KAMERA ---
    function startCamera() {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => { document.getElementById('video').srcObject = stream; })
        .catch(err => Swal.fire('Error Kamera', 'Pastikan izin kamera aktif dan gunakan HTTPS', 'error'));
    }

    // --- PERBAIKAN MIRROR (JAVASCRIPT) ---
    function capture() {
      const v = document.getElementById('video');
      const c = document.getElementById('cam-canvas');
      
      // Set ukuran canvas kotak (square) sesuai preview
      const size = 600; 
      c.width = size; 
      c.height = size;
      const ctx = c.getContext('2d');
      
      // Hitung pemotongan tengah (crop to square)
      const minDim = Math.min(v.videoWidth, v.videoHeight);
      const sx = (v.videoWidth - minDim) / 2;
      const sy = (v.videoHeight - minDim) / 2;

      // --- LOGIKA PENTING ---
      // 1. Balikkan canvas secara horizontal sebelum menggambar
      // Ini akan menetralkan efek mirror dari kamera depan
      ctx.translate(size, 0);
      ctx.scale(-1, 1);
      
      // 2. Gambar video ke canvas (hasilnya akan normal, tidak terbalik)
      ctx.drawImage(v, sx, sy, minDim, minDim, 0, 0, size, size);
      
      // Ambil data base64
      fotoData = c.toDataURL('image/jpeg', 0.8);
      
      // Tampilkan preview (CSS memastikan ini tidak terbalik lagi)
      document.getElementById('photo-preview').src = fotoData;
      document.getElementById('photo-preview').classList.remove('hidden');
      v.classList.add('hidden');
      document.getElementById('btn-cap').classList.add('hidden');
      document.getElementById('btn-retake').classList.remove('hidden');
    }

    function retake() {
      document.getElementById('video').classList.remove('hidden');
      document.getElementById('photo-preview').classList.add('hidden');
      document.getElementById('btn-cap').classList.remove('hidden');
      document.getElementById('btn-retake').classList.add('hidden');
      fotoData = "";
    }

    // --- LOGIKA SUBMIT ---
    document.getElementById('formReg').onsubmit = async function(e) {
      e.preventDefault();
      if (!fotoData) return Swal.fire('Foto?', 'Ambil foto dulu', 'warning');

      Swal.fire({ title: 'Menyimpan...', text:'Mohon tunggu', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      const payload = {
        nik: document.getElementById('nik').value,
        noHp: document.getElementById('noHp').value,
        nama: document.getElementById('nama').value,
        jk: document.getElementById('jk').value,
        asalsatker: document.getElementById('asalsatker').value,
        instansi: document.getElementById('instansi').value,
        jabatan: document.getElementById('jabatan').value
      };

      try {
        // Kirim Data via POST ke GAS
        await fetch(WEB_APP_URL, {
          method: 'POST',
          mode: 'no-cors', // Penting untuk GAS
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'submitData', data: payload, foto: fotoData })
        });

        // Karena no-cors, kita tidak bisa baca respon, asumsikan sukses
        Swal.fire('Berhasil', 'Pendaftaran Anda sedang diproses. Silakan cek daftar peserta.', 'success')
          .then(() => window.location.reload());
      } catch (err) {
        Swal.fire('Error', 'Gagal terhubung ke server', 'error');
      }
    };
    
    // Fungsi pembantu dropdown
    function updateInstansi() {
      const selectedSatker = document.getElementById('asalsatker').value;
      const filtered = masterData.filter(item => (item.satker || item.asalsatker) === selectedSatker);
      const instansis = [...new Set(filtered.map(item => item.instansi))].filter(i => i).sort();
      document.getElementById('instansi').innerHTML = '<option value="" disabled selected>Pilih Instansi</option>' +
        instansis.map(i => `<option value="${i}">${i}</option>`).join('');
    }
    
    function updateJabatan() {
      const selectedSatker = document.getElementById('asalsatker').value;
      const selectedInstansi = document.getElementById('instansi').value;
      const filtered = masterData.filter(item => (item.satker || item.asalsatker) === selectedSatker && item.instansi === selectedInstansi);
      const jabatans = [...new Set(filtered.map(item => item.jabatan))].filter(j => j).sort();
      document.getElementById('jabatan').innerHTML = '<option value="" disabled selected>Pilih Jabatan</option>' +
        jabatans.map(j => `<option value="${j}">${j}</option>`).join('');
    }

    async function doSearch() {
      const key = document.getElementById('keyword').value.toLowerCase();
      const div = document.getElementById('results');
      
      if (key.length < 3) { div.innerHTML = ""; return; }
      
      try {
          const response = await fetch(`${WEB_APP_URL}?action=getAllData`);
          const allData = await response.json();
          
          const filtered = allData.filter(r => 
              r.nama.toLowerCase().includes(key) || String(r.nik).includes(key)
          );
  
          div.innerHTML = filtered.map(r => `
              <div class="bg-white p-4 rounded-2xl shadow-sm border flex justify-between items-center mb-2">
                  <div class="text-left">
                      <div class="font-bold text-red-700">${r.nama}</div>
                      <div class="text-[10px] text-gray-500">NIK: ${r.nik}</div>
                  </div>
                  <button onclick="reprintID('${btoa(JSON.stringify(r))}')" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-xs font-bold">
                      <i class="fas fa-id-card"></i> Cetak
                  </button>
              </div>
          `).join('');
      } catch (e) { 
          div.innerHTML = "<div class='text-red-500 text-xs'>Gagal memuat data...</div>";
      }
    }

    // --- FUNGSI CETAK ULANG (DIJALANKAN DARI TOMBOL SEARCH) ---
    function reprintID(encodedData) {
        const data = JSON.parse(atob(encodedData));
        Swal.fire({ 
            title: 'Menyiapkan ID Card...', 
            allowOutsideClick: false, 
            didOpen: () => Swal.showLoading() 
        });
        
        // Ambil template secara asinkron sebelum render
        fetch(`${WEB_APP_URL}?action=getTemplate`)
            .then(res => res.json())
            .then(res => {
                templateCached = res.base64;
                renderID(data, true); 
            });
    }

  // --- CORE ENGINE: RENDER ID CARD ---
    function renderID(data, isReprint = false) {
        let canvas = document.getElementById('id-canvas');
        const ctx = canvas.getContext('2d');
    
        // Generate QR Code (Hidden)
        const qrContainer = document.createElement("div");
        new QRCode(qrContainer, {
            text: String(data.nik),
            width: 200, height: 200,
            correctLevel: QRCode.CorrectLevel.H
        });
    
        const bg = new Image();
        bg.crossOrigin = "anonymous";
        bg.onload = function() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(bg, 0, 0, 700, 1000);
            
            const user = new Image();
            user.crossOrigin = "anonymous";
            user.onload = function() {
                ctx.drawImage(user, 214, 440, 272, 272); 
    
                setTimeout(() => {
                    const qrImg = qrContainer.querySelector('img');
                    if(qrImg) {
                        ctx.fillStyle = "white";
                        ctx.fillRect(520, 820, 130, 130); 
                        ctx.drawImage(qrImg, 530, 830, 110, 110);
                    }
    
                    ctx.fillStyle = "black"; 
                    ctx.textAlign = "center";
                    ctx.font = "bold 34px Arial"; 
                    ctx.fillText(data.nama.toUpperCase(), 350, 780);
                    ctx.font = "26px Arial"; 
                    ctx.fillText(data.instansi || "", 350, 820);
                    ctx.font = "italic 24px Arial"; 
                    ctx.fillText(data.jabatan || "", 350, 855);
    
                    const imgUrl = canvas.toDataURL("image/png");
                    
                    // Simpan ke Drive via API POST
                    fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({
                            action: 'saveID',
                            base64: imgUrl,
                            nama: data.nama,
                            nik: data.nik
                        })
                    });
    
                    Swal.fire({
                        title: isReprint ? 'ID Card Peserta' : 'Pendaftaran Berhasil!',
                        imageUrl: imgUrl,
                        imageHeight: 400,
                        confirmButtonText: '<i class="fas fa-download"></i> Download',
                        confirmButtonColor: '#16a34a',
                        showCancelButton: true
                    }).then((result) => {
                        if (result.isConfirmed) {
                            const a = document.createElement('a');
                            a.href = imgUrl; 
                            a.download = `ID_${data.nama.replace(/\s+/g, '_')}.png`; 
                            a.click();
                            if (!isReprint) location.reload();
                        }
                    });
                }, 500);
            };
            // Handle Foto URL (Drive atau Base64)
            let fotoSrc = data.foto || data.fotoURL || "";
            if (fotoSrc.includes("drive.google.com")) {
                const id = fotoSrc.match(/[-\w]{25,}/);
                user.src = "https://drive.google.com/uc?export=view&id=" + id[0];
            } else {
                user.src = fotoSrc || "https://via.placeholder.com/272";
            }
        };
        bg.src = templateCached;
    }

  </script>
</body>

</html>
